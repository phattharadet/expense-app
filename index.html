<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="icon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6f00">

<title>Debt Tracker</title>

<style>
body{
  font-family:system-ui;
  margin:0;
  transition:.3s;
}

/* 🔴 หน้าหลัก */
.home{
  background:#ffebee;
  color:#d32f2f;
}

/* 🟢 หน้าประวัติ */
.history-mode{
  background:#e8f5e9;
  color:#2e7d32;
}

.container{max-width:520px;margin:auto;padding:15px}

.card{
  background:#fff;
  padding:15px;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  font-weight:bold;
  cursor:pointer;
}

/* 🔴 ปุ่มหน้าหลัก */
.home button{
  background:#e53935;
  color:#fff;
  border:none;
}

/* 🟢 ปุ่มหน้าประวัติ */
.history-mode button{
  background:#43a047;
  color:#fff;
  border:none;
}

.list-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  width:90px;
  display:block;
  margin:auto;
}

.history{display:none}
</style>

</head>

<body>

<body class="home">
<div class="container">

<img src="icon-512.png" class="logo">

<h2 style="text-align:center">Debt Tracker</h2>

<div class="card">
<input id="debtName" placeholder="ชื่อหนี้">
<input type="number" id="debtTotal" placeholder="ยอดหนี้">

<select id="debtType">
<option value="car">🚗 รถ</option>
<option value="home">🏠 บ้าน</option>
<option value="loan">💰 เงินกู้</option>
<option value="card">💳 บัตรเครดิต</option>
<option value="borrow">💵 เงินยืม</option>
</select>

<button onclick="addDebt()">เพิ่มหนี้</button>
</div>

<div class="card">
<h3>ยอดหนี้คงเหลือ</h3>
<h1 id="totalDebt">0 บาท</h1>
<button onclick="toggleHistory()">📜 ประวัติการจ่ายหนี้</button>
</div>

<div id="list"></div>

<div id="historyBox" class="history">
<div class="card">
<h3>ประวัติการจ่ายหนี้</h3>
<div id="historyList"></div>
</div>
</div>

</div>

<script>

let debts = JSON.parse(localStorage.getItem("debts")) || []
let history = JSON.parse(localStorage.getItem("history")) || []

const icons = {
car:"🚗",
home:"🏠",
loan:"💰",
card:"💳",
borrow:"💵"
}

function save(){
localStorage.setItem("debts",JSON.stringify(debts))
localStorage.setItem("history",JSON.stringify(history))
}

function addDebt(){
if(!debtName.value || !debtTotal.value) return

debts.push({
name:debtName.value,
total:+debtTotal.value,
paid:0,
type:debtType.value
})

debtName.value=""
debtTotal.value=""

save()
show()
}

function payDebt(i){

let pay = prompt("จำนวนเงินที่จ่าย")
if(!pay) return

debts[i].paid += +pay

if(debts[i].paid >= debts[i].total){

history.push({
name:debts[i].name,
total:debts[i].total,
type:debts[i].type,
date:new Date().toLocaleDateString()
})

debts.splice(i,1)
}

save()
show()
}

function deleteHistory(i){
history.splice(i,1)
save()
show()
}

function totalDebt(){
return debts.reduce((s,d)=>s+(d.total-d.paid),0)
}

function formatMoney(n){
return n.toLocaleString()+" บาท"
}

function toggleHistory(){

const isHidden = historyBox.style.display === "none"

historyBox.style.display = isHidden ? "block" : "none"

/* 🔥 เปลี่ยนโหมดสี */
document.body.className = isHidden ? "history-mode" : "home"
}

function show(){

totalDebt.innerHTML = formatMoney(totalDebt())

list.innerHTML=""

debts.forEach((d,i)=>{
list.innerHTML += `
<div class="card list-item">
<div>${icons[d.type]} ${d.name}<br>${formatMoney(d.total-d.paid)}</div>
<div><button onclick="payDebt(${i})">จ่าย</button></div>
</div>
`
})

historyList.innerHTML=""

history.forEach((h,i)=>{
historyList.innerHTML += `
<div class="card list-item">
<div>${icons[h.type]} ${h.name}<br>ชำระครบ ${formatMoney(h.total)}</div>
<div>
<small>${h.date}</small><br>
<button onclick="deleteHistory(${i})">ลบ</button>
</div>
</div>
`
})

}

show()

</script>
</body>
</html>
