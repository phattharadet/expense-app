<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<style>
body{font-family:system-ui;background:#f5f7fa;margin:0}
.container{max-width:520px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:16px;margin-bottom:15px}
.dashboard{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;text-align:center}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ddd}
.list-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.add-btn{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;font-size:30px;background:#4CAF50;color:#fff;border:none}
</style>
</head>

<body>

<div class="container">

<h3 style="text-align:center">💼 Expense Tracker</h3>

<div class="card dashboard" id="dashboard"></div>

<div class="card">
<input id="newAccount" placeholder="เพิ่มบัญชีใหม่">
<button onclick="addAccount()">เพิ่มบัญชี</button>

<select id="accountSelect"></select>

<input type="date" id="date">
<input type="text" id="detail" placeholder="รายละเอียด">
<input type="number" id="amount" placeholder="จำนวนเงิน">

<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<button onclick="addItem()">บันทึก</button>
</div>

<div class="card">
<h4>ถอนเงิน</h4>
<select id="withdrawAccount"></select>
<input type="number" id="withdrawAmount" placeholder="จำนวนเงิน">
<button onclick="withdraw()">ถอนเงิน</button>
</div>

<div class="card">
<h4>เพิ่มหนี้</h4>
<input id="debtName" placeholder="ชื่อหนี้">
<input type="number" id="debtTotal" placeholder="ยอดหนี้">
<button onclick="addDebt()">เพิ่มหนี้</button>
</div>

<div id="list"></div>

</div>

<button class="add-btn" onclick="addItem()">+</button>

<script>

let data=JSON.parse(localStorage.getItem("data"))||[]
let debts=JSON.parse(localStorage.getItem("debts"))||[]
let accounts=JSON.parse(localStorage.getItem("accounts"))||["เงินสด"]

function save(){
localStorage.setItem("data",JSON.stringify(data))
localStorage.setItem("debts",JSON.stringify(debts))
localStorage.setItem("accounts",JSON.stringify(accounts))
}

function renderAccounts(){
accountSelect.innerHTML=""
withdrawAccount.innerHTML=""
accounts.forEach(a=>{
accountSelect.innerHTML+=`<option>${a}</option>`
withdrawAccount.innerHTML+=`<option>${a}</option>`
})
}

function addAccount(){
if(!newAccount.value)return
accounts.push(newAccount.value)
newAccount.value=""
save()
renderAccounts()
show()
}

function addItem(){
data.push({
date:date.value,
detail:detail.value,
amount:+amount.value,
type:type.value,
account:accountSelect.value
})
save()
show()
}

function withdraw(){
let acc=withdrawAccount.value
let amt=+withdrawAmount.value

data.push({date:new Date().toISOString().slice(0,10),detail:"ถอนเงิน",amount:amt,type:"expense",account:acc})
data.push({date:new Date().toISOString().slice(0,10),detail:"เงินสดจาก "+acc,amount:amt,type:"income",account:"เงินสด"})

save()
show()
withdrawAmount.value=""
}

function addDebt(){
debts.push({name:debtName.value,total:+debtTotal.value,paid:0})
save()
show()
}

function payDebt(i){
let pay=prompt("จำนวนเงินที่จ่าย")
debts[i].paid+=+pay
if(debts[i].paid>=debts[i].total)debts.splice(i,1)
save()
show()
}

function totalDebt(){
return debts.reduce((s,d)=>s+(d.total-d.paid),0)
}

function formatMoney(n){return n.toLocaleString()+" บาท"}

function show(){

let balance={}

accounts.forEach(a=>balance[a]=0)

data.forEach(d=>{
if(d.type=="income") balance[d.account]+=d.amount
else balance[d.account]-=d.amount
})

dashboard.innerHTML=""

accounts.forEach(a=>{
dashboard.innerHTML+=`
<div class="card">
<small>${a}</small>
<h3>${formatMoney(balance[a])}</h3>
</div>`
})

dashboard.innerHTML+=`
<div class="card">
<small>หนี้</small>
<h3 style="color:#ef6c00">${formatMoney(totalDebt())}</h3>
</div>`

list.innerHTML=""

data.forEach((d,i)=>{
list.innerHTML+=`
<div class="card list-item">
<div>${d.detail}<br><small>${d.account}</small></div>
<div>${formatMoney(d.amount)}
<br><button onclick="data.splice(${i},1);save();show()">ลบ</button></div>
</div>`
})

debts.forEach((d,i)=>{
list.innerHTML+=`
<div class="card list-item">
<div>💳 ${d.name}<br>${formatMoney(d.total-d.paid)}</div>
<div><button onclick="payDebt(${i})">จ่าย</button></div>
</div>`
})
}

renderAccounts()
show()

</script>
</body>
</html>
