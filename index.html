<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Pro</title>

<style>
:root{
--main:#34C759;
--bg:#f5f7fa;
--card:#ffffff;
}
body{font-family:system-ui;background:var(--bg);margin:0}
.appbar{
background:linear-gradient(135deg,#34C759,#30B0C7);
color:#fff;padding:18px;font-size:20px;font-weight:600;
text-align:center;border-radius:0 0 20px 20px;
}
.container{max-width:520px;margin:auto;padding:15px}
.card{
background:var(--card);
border-radius:18px;
padding:16px;
margin-bottom:15px;
box-shadow:0 6px 16px rgba(0,0,0,.08);
}
.list-item{
display:flex;
justify-content:space-between;
align-items:center;
border-left:6px solid;
}
.income{border-color:#2e7d32}
.expense{border-color:#c62828}
.deposit{border-color:#00c853}
.withdraw{border-color:#ff9800}
.transferOut{border-color:#d32f2f}
.cashToBank{border-color:#0097a7}
.bankToBank{border-color:#1565c0}
button{
background:var(--main);
color:#fff;
border:none;
padding:8px 12px;
border-radius:10px;
margin-top:6px;
cursor:pointer;
}
.delete-btn{background:#e53935}
input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:6px;
}
</style>
</head>

<body>
<div class="container">
<div class="appbar">💰 Expense Tracker Pro</div>

<!-- Dashboard -->
<div class="card">
<div><small>เงินสด</small><h3 id="cash"></h3></div>
<div><small>รวมเงินธนาคาร</small><h3 id="totalBank"></h3></div>
<div><small>รายรับรวม</small><h3 id="income"></h3></div>
<div><small>รายจ่ายรวม</small><h3 id="expense"></h3></div>
</div>

<!-- รายรับรายจ่าย -->
<div class="card">
<h3>💰 บันทึกรายรับรายจ่าย</h3>
<input type="date" id="date">
<input type="text" id="detail" placeholder="รายละเอียด">
<input type="number" id="amount" placeholder="จำนวนเงิน">
<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>
<button onclick="addIncomeExpense()">บันทึก</button>
</div>

<!-- เพิ่มบัญชี -->
<div class="card">
<h3>🏦 เพิ่มบัญชีธนาคาร</h3>
<input id="bankName" placeholder="ชื่อบัญชี">
<input id="bankAmount" type="number" placeholder="ยอดเริ่มต้น">
<button onclick="addBank()">เพิ่มบัญชี</button>
<div id="bankList"></div>
</div>

<!-- จัดการเงิน -->
<div class="card">
<h3>🔄 จัดการเงิน</h3>
<select id="actionType">
<option value="deposit">เงินเข้าบัญชี</option>
<option value="withdraw">ถอนเข้ากระเป๋าเงินสด</option>
<option value="transferOut">โอนออกให้คนอื่น</option>
<option value="cashToBank">เงินสดเข้าบัญชี</option>
<option value="bankToBank">โอนระหว่างบัญชี</option>
</select>

<select id="fromBank"></select>
<select id="toBank"></select>

<input id="actionAmount" type="number" placeholder="จำนวนเงิน">
<input id="actionDetail" placeholder="รายละเอียด">
<button onclick="handleAction()">ทำรายการ</button>
</div>

<!-- รายการทั้งหมด -->
<div id="list"></div>

</div>

<script>
let data=JSON.parse(localStorage.getItem("data"))||[]
let banks=JSON.parse(localStorage.getItem("banks"))||[]
let cash=JSON.parse(localStorage.getItem("cash"))||0

function save(){
localStorage.setItem("data",JSON.stringify(data))
localStorage.setItem("banks",JSON.stringify(banks))
localStorage.setItem("cash",JSON.stringify(cash))
}

function format(n){return n.toLocaleString()+" บาท"}

function addIncomeExpense(){
if(!date.value||!detail.value||!amount.value) return alert("กรอกข้อมูลให้ครบ")

data.push({
date:date.value,
detail:detail.value,
amount:+amount.value,
type:type.value
})

date.value=""
detail.value=""
amount.value=""
save();show()
}

function addBank(){
if(!bankName.value||!bankAmount.value) return alert("กรอกข้อมูลให้ครบ")
banks.push({name:bankName.value,balance:+bankAmount.value})
bankName.value=""
bankAmount.value=""
save();show()
}

function handleAction(){
let t=actionType.value
let amt=+actionAmount.value
let from=fromBank.value
let to=toBank.value
let detail=actionDetail.value||t

if(!amt) return alert("กรอกจำนวนเงิน")

if(t=="deposit") banks[from].balance+=amt

if(t=="withdraw"){
if(banks[from].balance<amt) return alert("เงินไม่พอ")
banks[from].balance-=amt
cash+=amt
}

if(t=="transferOut"){
if(banks[from].balance<amt) return alert("เงินไม่พอ")
banks[from].balance-=amt
}

if(t=="cashToBank"){
if(cash<amt) return alert("เงินสดไม่พอ")
cash-=amt
banks[to].balance+=amt
}

if(t=="bankToBank"){
if(banks[from].balance<amt) return alert("เงินไม่พอ")
banks[from].balance-=amt
banks[to].balance+=amt
}

data.push({
date:new Date().toISOString().split("T")[0],
detail:detail,
amount:amt,
type:t,
from:from,
to:to
})

actionAmount.value=""
actionDetail.value=""
save();show()
}

function deleteItem(i){

if(!confirm("ลบรายการนี้?")) return

let d = data[i]
if(!d) return

let amt = Number(d.amount) || 0

// กัน index พัง
let from = d.from !== undefined ? Number(d.from) : null
let to   = d.to   !== undefined ? Number(d.to)   : null

// คืนยอดเงินแบบปลอดภัย
if(d.type === "deposit" && banks[from]){
banks[from].balance -= amt
}

if(d.type === "withdraw" && banks[from]){
banks[from].balance += amt
cash -= amt
}

if(d.type === "transferOut" && banks[from]){
banks[from].balance += amt
}

if(d.type === "cashToBank" && banks[to]){
cash += amt
banks[to].balance -= amt
}

if(d.type === "bankToBank" && banks[from] && banks[to]){
banks[from].balance += amt
banks[to].balance -= amt
}

// ลบจริง
data.splice(i,1)

save()
show()
}

function show(){
document.getElementById("cash").innerText=format(cash)
document.getElementById("totalBank").innerText=format(
banks.reduce((s,b)=>s+b.balance,0)
)

let inc=0,exp=0
list.innerHTML=""

data.forEach((d,i)=>{
if(["income","deposit","cashToBank"].includes(d.type)) inc+=d.amount
if(["expense","withdraw","transferOut"].includes(d.type)) exp+=d.amount

list.innerHTML+=`
<div class="card list-item ${d.type}">
<div>
${d.detail}<br>
<small>${d.date}</small>
</div>
<div align="right">
${format(d.amount)}<br>
<button class="delete-btn" onclick="deleteItem(${i})">ลบ</button>
</div>
</div>`
})

document.getElementById("income").innerText=format(inc)
document.getElementById("expense").innerText=format(exp)

bankList.innerHTML=""
fromBank.innerHTML=""
toBank.innerHTML=""
banks.forEach((b,i)=>{
bankList.innerHTML+=`
<div class="card">
<b>${b.name}</b><br>
ยอดเงิน: ${format(b.balance)}
</div>`
fromBank.innerHTML+=`<option value="${i}">${b.name}</option>`
toBank.innerHTML+=`<option value="${i}">${b.name}</option>`
})
}

show()
</script>
</body>
</html>
