<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Manager Pro ULTRA MAX</title>

<style>
body{font-family:system-ui;background:#f5f7fa;margin:0}
.container{max-width:520px;margin:auto;padding:14px}
.card{background:#fff;padding:14px;border-radius:16px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
button{background:#ff9800;color:#fff;border:none;padding:7px 10px;border-radius:10px;margin-top:6px;font-size:13px}
.delete{background:#e53935}
input,select{width:100%;padding:9px;margin-top:6px;border-radius:10px;border:1px solid #ddd}
.item{padding:10px;border-left:6px solid;margin-top:8px;background:#fff;border-radius:12px}
.income{border-color:#2e7d32}
.expense{border-color:#c62828}
.transfer{border-color:#1565c0}
.debtPay{border-color:#6a1b9a}
h3{margin:4px 0}
</style>
</head>

<body>
<div class="container">

<div class="card">
เงินสด: <b id="cashShow"></b><br>
เงินในธนาคาร: <b id="bankShow"></b><br>
หนี้คงเหลือ: <b id="debtShow"></b>
</div>

<div class="card">
<h3>💵 เงินสด</h3>
<input type="number" id="cashInput">
<button onclick="addCash()">เพิ่ม</button>
<button onclick="reduceCash()">ลด</button>
<button onclick="setCash()">ตั้งยอด</button>
</div>

<div class="card">
<h3>🏦 เพิ่มบัญชีธนาคาร</h3>
<input id="bankName" placeholder="ชื่อบัญชี">
<input type="number" id="bankBalance" placeholder="ยอดเงิน">
<button onclick="addBank()">เพิ่มบัญชี</button>
<div id="bankList"></div>
</div>

<div class="card">
<h3>💸 รายรับรายจ่าย</h3>
<input type="date" id="date">
<input id="detail" placeholder="รายละเอียด">
<input type="number" id="amount" placeholder="จำนวนเงิน">

<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="wallet"></select>

<button onclick="addTransaction()">บันทึก</button>
</div>

<div class="card">
<h3>📄 เพิ่มหนี้</h3>
<input id="debtName" placeholder="ชื่อหนี้">
<input type="number" id="debtAmount" placeholder="จำนวนเงิน">
<button onclick="addDebt()">เพิ่มหนี้</button>
<div id="debtList"></div>
</div>

<div class="card">
<h3>📜 รายการทั้งหมด</h3>

<h4>💸 รายรับ</h4>
<div id="incomeList"></div>

<h4>🧾 รายจ่าย</h4>
<div id="expenseList"></div>

<h4>🏦 ธุรกรรมเงิน</h4>
<div id="transferList"></div>

<h4>📄 จ่ายหนี้</h4>
<div id="debtPayList"></div>

</div>

</div>

<script>

let cash=+localStorage.getItem("cash")||0
let banks=JSON.parse(localStorage.getItem("banks"))||[]
let debts=JSON.parse(localStorage.getItem("debts"))||[]
let data=JSON.parse(localStorage.getItem("data"))||[]

function save(){
localStorage.setItem("cash",cash)
localStorage.setItem("banks",JSON.stringify(banks))
localStorage.setItem("debts",JSON.stringify(debts))
localStorage.setItem("data",JSON.stringify(data))
}

function format(n){return (n||0).toLocaleString()+" บาท"}

function updateWallet(){
wallet.innerHTML='<option value="cash">เงินสด</option>'
banks.forEach((b,i)=>{
wallet.innerHTML+=`<option value="bank-${i}">${b.name}</option>`
})
}

function render(){

cashShow.innerText=format(cash)
bankShow.innerText=format(banks.reduce((s,b)=>s+b.balance,0))
debtShow.innerText=format(debts.reduce((s,d)=>s+d.amount,0))

updateWallet()

bankList.innerHTML=banks.map((b,i)=>`
<div class="item">
${b.name} : ${format(b.balance)}
<br>
<button onclick="editBank(${i})">ตั้งยอด</button>
<button class="delete" onclick="deleteBank(${i})">ลบ</button>
</div>`).join("")

debtList.innerHTML=debts.map((d,i)=>`
<div class="item">
${d.name} : ${format(d.amount)}
<input type="number" id="pay${i}" placeholder="จำนวนที่จ่าย">
<select id="payFrom${i}">${wallet.innerHTML}</select>
<button onclick="payDebt(${i})">จ่ายหนี้</button>
</div>`).join("")

incomeList.innerHTML=""
expenseList.innerHTML=""
transferList.innerHTML=""
debtPayList.innerHTML=""

data.slice().reverse().forEach((d,idx)=>{

let realIndex=data.length-1-idx

let html=`
<div class="item ${d.type}">
<b>${d.detail}</b><br>
${d.date} | ${d.wallet}<br>
${d.type=="income"?"+":"-"}${format(d.amount)}
<button class="delete" onclick="deleteItem(${realIndex})">ลบ</button>
</div>
`

if(d.type=="income") incomeList.innerHTML+=html
else if(d.type=="expense") expenseList.innerHTML+=html
else if(d.type=="debtPay") debtPayList.innerHTML+=html
else transferList.innerHTML+=html

})

}

function addCash(){let v=+cashInput.value;if(!v)return;cash+=v;cashInput.value="";save();render()}
function reduceCash(){let v=+cashInput.value;if(!v||cash<v)return;cash-=v;cashInput.value="";save();render()}
function setCash(){cash=+cashInput.value||0;cashInput.value="";save();render()}

function addBank(){
if(!bankName.value||!bankBalance.value)return
banks.push({name:bankName.value,balance:+bankBalance.value})
bankName.value="";bankBalance.value=""
save();render()
}

function editBank(i){
let val=prompt("ตั้งยอดใหม่",banks[i].balance)
if(val!==null){banks[i].balance=+val;save();render()}
}

function deleteBank(i){
if(confirm("ลบบัญชี?")){banks.splice(i,1);save();render()}
}

function addTransaction(){

let amt=+amount.value
let w=wallet.value
let name=wallet.options[wallet.selectedIndex].text

if(!detail.value||!amt)return alert("กรอกข้อมูล")

if(type.value=="income"){
if(w=="cash")cash+=amt
else banks[w.split("-")[1]].balance+=amt
}else{
if(w=="cash"){if(cash<amt)return alert("เงินสดไม่พอ");cash-=amt}
else{
let id=w.split("-")[1]
if(banks[id].balance<amt)return alert("เงินไม่พอ")
banks[id].balance-=amt
}
}

data.push({
date:date.value||new Date().toISOString().split("T")[0],
detail:detail.value,
amount:amt,
type:type.value,
wallet:name
})

detail.value="";amount.value=""
save();render()
}

function addDebt(){
if(!debtName.value||!debtAmount.value)return
debts.push({name:debtName.value,amount:+debtAmount.value})
debtName.value="";debtAmount.value=""
save();render()
}

function payDebt(i){

let amt=+document.getElementById("pay"+i).value
let w=document.getElementById("payFrom"+i).value
let name=document.getElementById("payFrom"+i).options[
document.getElementById("payFrom"+i).selectedIndex].text

if(!amt)return

if(w=="cash"){if(cash<amt)return alert("เงินสดไม่พอ");cash-=amt}
else{
let id=w.split("-")[1]
if(banks[id].balance<amt)return alert("เงินไม่พอ")
banks[id].balance-=amt
}

debts[i].amount-=amt
if(debts[i].amount<=0)debts.splice(i,1)

data.push({
date:new Date().toISOString().split("T")[0],
detail:"จ่ายหนี้",
amount:amt,
type:"debtPay",
wallet:name
})

save();render()
}

function deleteItem(i){
if(confirm("ลบรายการ?")){
data.splice(i,1)
save();render()
}
}

render()

</script>
</body>
</html>
